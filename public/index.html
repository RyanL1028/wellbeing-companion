<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4CAF50">
    <meta name="description" content="Wellbeing-Companion — Your all-in-one student health and wellbeing tracker.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="stylesheet" href="/static/style.css?v=2">
    <title>Dashboard — Wellbeing-Companion</title>
</head>
<body data-page="dashboard">
    <!-- Skip to main content for accessibility -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <!-- Top header bar -->
    <header class="app-header">
        <div class="header-left">
            <span class="logo-icon">🌱</span>
            <h1 class="app-title">Wellness</h1>
        </div>
        <div class="header-right">
            <span id="current-date" class="current-date"></span>
            <!-- Auth area: sign-in button or user menu -->
            <span id="auth-area">
                <button id="auth-signin-btn" class="auth-btn" aria-label="Sign in with Microsoft">
                    <span class="auth-icon">🔐</span> Sign in
                </button>
            </span>
        </div>
    </header>

    <!-- Main content area -->
    <main id="main-content">
        
<section class="page-section">
    <h2 class="section-title">Your Wellness at a Glance</h2>

    <!-- Wellness Score Ring -->
    <div class="card wellness-score-card">
        <div class="score-ring-container">
            <div class="score-ring" id="wellness-ring">
                <svg viewBox="0 0 120 120" class="ring-svg">
                    <circle class="ring-bg" cx="60" cy="60" r="52"/>
                    <circle class="ring-fill" cx="60" cy="60" r="52" id="ring-circle"/>
                </svg>
                <div class="score-value" id="wellness-score">--</div>
            </div>
            <p class="score-label">Wellness Score</p>
        </div>
    </div>

    <!-- Streak Cards -->
    <div class="grid" id="streak-grid">
        <div class="card streak-card">
            <div class="streak-icon">😊</div>
            <div class="streak-count" id="streak-mood">0</div>
            <div class="streak-label">Mood Check-ins</div>
        </div>
        <div class="card streak-card">
            <div class="streak-icon">💧</div>
            <div class="streak-count" id="streak-water">0</div>
            <div class="streak-label">Water Tracking</div>
        </div>
        <div class="card streak-card">
            <div class="streak-icon">🏃</div>
            <div class="streak-count" id="streak-activity">0</div>
            <div class="streak-label">Activity Days</div>
        </div>
        <div class="card streak-card">
            <div class="streak-icon">📖</div>
            <div class="streak-count" id="streak-study">0</div>
            <div class="streak-label">Study Sessions</div>
        </div>
    </div>

    <!-- Quick Add Buttons -->
    <h3 class="section-subtitle">Quick Log</h3>
    <div class="quick-actions">
        <button class="btn btn-primary quick-btn" id="quick-mood" aria-label="Log mood">
            <span class="quick-icon">😊</span> Log Mood
        </button>
        <button class="btn btn-primary quick-btn" id="quick-water" aria-label="Add water">
            <span class="quick-icon">💧</span> Add Water
        </button>
        <button class="btn btn-primary quick-btn" id="quick-activity" aria-label="Log activity">
            <span class="quick-icon">🏃</span> Log Activity
        </button>
    </div>

    <!-- Quick-add inline forms (hidden by default) -->
    <div class="card quick-form" id="quick-mood-form" style="display:none;">
        <h4>How are you feeling?</h4>
        <div class="mood-emoji-picker" id="quick-mood-picker">
            <button class="mood-btn" data-mood="1" aria-label="Very bad">😢</button>
            <button class="mood-btn" data-mood="2" aria-label="Bad">😟</button>
            <button class="mood-btn" data-mood="3" aria-label="Okay">😐</button>
            <button class="mood-btn" data-mood="4" aria-label="Good">😊</button>
            <button class="mood-btn" data-mood="5" aria-label="Great">🤩</button>
        </div>
    </div>

    <div class="card quick-form" id="quick-water-form" style="display:none;">
        <h4>Add Water Glasses</h4>
        <div class="water-quick-add">
            <button class="btn btn-small water-minus">−</button>
            <span class="water-count-display" id="quick-water-count">1</span>
            <button class="btn btn-small water-plus">+</button>
        </div>
        <button class="btn btn-primary btn-full" id="quick-water-save">Save</button>
    </div>

    <div class="card quick-form" id="quick-activity-form" style="display:none;">
        <h4>Log Activity</h4>
        <div class="form-group">
            <label for="quick-activity-type">Type</label>
            <select id="quick-activity-type">
                <option value="walk">🚶 Walk</option>
                <option value="run">🏃 Run</option>
                <option value="gym">🏋️ Gym</option>
                <option value="sport">⚽ Sport</option>
                <option value="yoga">🧘 Yoga</option>
                <option value="other">💪 Other</option>
            </select>
        </div>
        <div class="form-group">
            <label for="quick-activity-minutes">Minutes</label>
            <input type="number" id="quick-activity-minutes" min="1" max="300" value="30">
        </div>
        <button class="btn btn-primary btn-full" id="quick-activity-save">Save</button>
    </div>
</section>

    </main>

    <!-- Bottom navigation bar (mobile-friendly) -->
    <nav class="bottom-nav">
        <a href="/" class="nav-item active" aria-label="Dashboard">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Home</span>
        </a>
        <a href="/mental-health" class="nav-item " aria-label="Mental Health">
            <span class="nav-icon">🧠</span>
            <span class="nav-label">Mind</span>
        </a>
        <a href="/physical-health" class="nav-item " aria-label="Physical Health">
            <span class="nav-icon">💪</span>
            <span class="nav-label">Body</span>
        </a>
        <a href="/nutrition" class="nav-item " aria-label="Nutrition">
            <span class="nav-icon">🥗</span>
            <span class="nav-label">Food</span>
        </a>
        <a href="/study-life" class="nav-item " aria-label="Study-Life Balance">
            <span class="nav-icon">📚</span>
            <span class="nav-label">Study</span>
        </a>
    </nav>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <!-- App Scripts (order matters) -->
    <script src="/static/firebase-config.js"></script>
    <script src="/static/storage.js"></script>
    <script src="/static/auth.js"></script>
    <script src="/static/app.js"></script>

    <!-- Wire up auth → storage cloud sync -->
    <script>
        (function() {
            if (typeof Auth === 'undefined' || typeof Storage === 'undefined') return;

            Auth.onAuthStateChanged(function(user) {
                var authArea = document.getElementById('auth-area');
                if (!authArea) return;

                if (user) {
                    // Enable cloud sync and load data from Firestore
                    Storage.enableCloud(user.uid);
                    Storage.loadFromCloud(function() {
                        // Re-render current page after cloud data merge
                        var pageName = document.body.dataset.page;
                        if (pageName && page[pageName] && typeof page[pageName].init === 'function') {
                            page[pageName].init();
                        }
                    });

                    var firstName = (user.displayName || '').split(' ')[0] || user.email || 'User';
                    var initial = firstName.charAt(0).toUpperCase();
                    var avatarHtml = user.photoURL
                        ? '<img class="user-avatar" src="' + user.photoURL + '" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">' +
                          '<span class="user-fallback" style="display:none;">' + initial + '</span>'
                        : '<span class="user-fallback">' + initial + '</span>';

                    authArea.innerHTML =
                        '<div class="auth-menu">' +
                            '<button class="auth-user-btn" id="auth-user-btn" aria-label="User menu">' +
                                avatarHtml +
                                '<span class="user-name">' + firstName + '</span>' +
                            '</button>' +
                            '<div class="auth-dropdown" id="auth-dropdown" style="display:none;">' +
                                '<div class="dropdown-user-info">' +
                                    '<span class="dropdown-name">' + (user.displayName || 'User') + '</span>' +
                                    '<span class="dropdown-email">' + (user.email || '') + '</span>' +
                                '</div>' +
                                '<button class="dropdown-signout" id="dropdown-signout">Sign out</button>' +
                            '</div>' +
                        '</div>';

                    document.getElementById('auth-user-btn').addEventListener('click', function(e) {
                        e.stopPropagation();
                        var dd = document.getElementById('auth-dropdown');
                        dd.style.display = dd.style.display === 'none' ? 'block' : 'none';
                    });

                    document.addEventListener('click', function() {
                        var dd = document.getElementById('auth-dropdown');
                        if (dd) dd.style.display = 'none';
                    });

                    document.getElementById('dropdown-signout').addEventListener('click', function() {
                        Auth.signOut().then(function() {
                            Storage.disableCloud();
                            location.reload();
                        });
                    });

                } else {
                    Storage.disableCloud();
                    authArea.innerHTML =
                        '<a href="/auth" class="auth-btn" aria-label="Sign in">' +
                            '<span class="auth-icon">🔐</span> Sign in' +
                        '</a>';
                }
            });
        })();
    </script>

    <!-- Register service worker for PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/sw.js').catch(function(err) {
                    console.log('Service Worker registration failed:', err);
                });
            });
        }
    </script>
</body>
</html>
