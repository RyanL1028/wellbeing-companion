{% extends "base.html" %}
{% set page_id = "auth" %}
{% block title %}Sign In — Wellbeing-Companion{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <!-- Brand -->
        <div class="auth-brand">
            <span class="auth-logo">🌱</span>
            <h1 class="auth-app-name">Wellbeing Companion</h1>
        </div>

        <!-- Social sign-in buttons (primary, prominent) -->
        <div class="auth-social-stack">
            <button class="auth-social-btn google" id="auth-google" aria-label="Sign in with Google">
                <svg class="social-svg" width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span>Continue with Google</span>
            </button>

            <button class="auth-social-btn microsoft" id="auth-microsoft" aria-label="Sign in with Microsoft">
                <svg class="social-svg" width="20" height="20" viewBox="0 0 21 21">
                    <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
                    <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
                    <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
                    <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
                </svg>
                <span>Continue with Microsoft</span>
            </button>
        </div>

        <!-- Divider -->
        <div class="auth-divider">
            <span>or sign in with email</span>
        </div>

        <!-- Email / Password form -->
        <form class="auth-email-form" id="auth-form" novalidate>
            <div class="auth-field" id="auth-name-field" style="display:none;">
                <input type="text" id="auth-name" name="name"
                       placeholder="Full name" autocomplete="name">
            </div>
            <div class="auth-field">
                <input type="email" id="auth-email" name="email"
                       placeholder="Email address" required autocomplete="email">
            </div>
            <div class="auth-field">
                <input type="password" id="auth-password" name="password"
                       placeholder="Password" required
                       minlength="6" autocomplete="current-password">
            </div>
            <div class="auth-error" id="auth-error" style="display:none;"></div>
            <button type="submit" class="auth-submit-btn" id="auth-submit-btn">
                <span id="auth-submit-label">Sign in</span>
            </button>
        </form>

        <!-- Toggle between sign-in and sign-up -->
        <p class="auth-switch" id="auth-switch">
            Don't have an account? <button type="button" class="auth-switch-btn" id="auth-switch-btn">Create one</button>
        </p>
    </div>
</div>

<script>
(function() {
    var isSignUp = false;
    var nameField = document.getElementById('auth-name-field');
    var submitLabel = document.getElementById('auth-submit-label');
    var switchText = document.getElementById('auth-switch');
    var switchBtn = document.getElementById('auth-switch-btn');
    var errorEl = document.getElementById('auth-error');
    var submitBtn = document.getElementById('auth-submit-btn');
    var emailInput = document.getElementById('auth-email');
    var nameInput = document.getElementById('auth-name');
    var passwordInput = document.getElementById('auth-password');

    function setMode(signUp) {
        isSignUp = signUp;
        nameField.style.display = signUp ? 'block' : 'none';
        submitLabel.textContent = signUp ? 'Create account' : 'Sign in';
        switchText.innerHTML = signUp
            ? 'Already have an account? <button type="button" class="auth-switch-btn" id="auth-switch-btn">Sign in</button>'
            : 'Don\'t have an account? <button type="button" class="auth-switch-btn" id="auth-switch-btn">Create one</button>';
        // Re-bind the new button
        document.getElementById('auth-switch-btn').addEventListener('click', function() {
            setMode(!isSignUp);
        });
        hideError();
    }

    // Initial binding
    switchBtn.addEventListener('click', function() { setMode(true); });

    function showError(msg) {
        errorEl.textContent = msg;
        errorEl.style.display = 'block';
        errorEl.style.animation = 'none';
        errorEl.offsetHeight; // trigger reflow
        errorEl.style.animation = 'fadeIn 0.25s ease';
    }

    function hideError() {
        errorEl.style.display = 'none';
    }

    // Submit handler
    document.getElementById('auth-form').addEventListener('submit', function(e) {
        e.preventDefault();
        hideError();

        var email = emailInput.value.trim();
        var password = passwordInput.value;

        if (!email || !password) {
            showError('Please enter your email and password.');
            return;
        }
        if (password.length < 6) {
            showError('Password must be at least 6 characters.');
            return;
        }

        submitBtn.disabled = true;
        submitLabel.textContent = isSignUp ? 'Creating account…' : 'Signing in…';

        var promise;
        if (isSignUp) {
            var name = nameInput.value.trim();
            promise = Auth.signUpWithEmail(email, password).then(function() {
                if (name && firebase.auth().currentUser) {
                    return firebase.auth().currentUser.updateProfile({ displayName: name });
                }
            });
        } else {
            promise = Auth.signInWithEmail(email, password);
        }

        promise.then(function() {
            window.location.href = '/';
        }).catch(function(err) {
            submitBtn.disabled = false;
            submitLabel.textContent = isSignUp ? 'Create account' : 'Sign in';

            var msg = err.message;
            if (err.code === 'auth/email-already-in-use') {
                msg = 'An account with this email already exists. Sign in instead.';
            } else if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
                msg = 'Invalid email or password.';
            } else if (err.code === 'auth/invalid-email') {
                msg = 'Please enter a valid email address.';
            } else if (err.code === 'auth/weak-password') {
                msg = 'Password is too weak — use at least 6 characters.';
            }
            showError(msg);
        });
    });

    function handleSocialError(err, providerName, btn) {
        // If we're signed in despite the error, just go home
        if (Auth.isSignedIn()) {
            window.location.href = '/';
            return;
        }
        btn.disabled = false;
        btn.classList.remove('loading');
        // Only show error for real failures (not popup/redirect flows)
        var benign = ['auth/popup-blocked', 'auth/popup-closed-by-user', 'auth/cancelled-popup-request'];
        if (benign.indexOf(err.code) === -1) {
            showError(providerName + ' error: ' + (err.code || err.message));
        }
    }

    // Google
    document.getElementById('auth-google').addEventListener('click', function() {
        hideError();
        var btn = this;
        btn.disabled = true;
        btn.classList.add('loading');
        Auth.signInWithGoogle().then(function() {
            window.location.href = '/';
        }).catch(function(err) {
            handleSocialError(err, 'Google', btn);
        });
    });

    // Microsoft
    document.getElementById('auth-microsoft').addEventListener('click', function() {
        hideError();
        var btn = this;
        btn.disabled = true;
        btn.classList.add('loading');
        Auth.signInWithMicrosoft().then(function() {
            window.location.href = '/';
        }).catch(function(err) {
            handleSocialError(err, 'Microsoft', btn);
        });
    });

    // Redirect if already signed in
    Auth.onAuthStateChanged(function(user) {
        if (user) window.location.href = '/';
    });
})();
</script>
{% endblock %}
